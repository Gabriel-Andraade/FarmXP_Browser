# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/configuration

language: "en-US"
early_access: false

reviews:
  # Path filters narrow the review scope. Auto-generated artifacts and
  # binary assets are excluded so CodeRabbit focuses on real source code.
  path_filters:
    # ── Binary assets — not reviewable ──────────────────────────────
    - "!**/*.webp"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.ico"
    - "!**/*.mp3"
    - "!**/*.wav"
    - "!**/*.ogg"
    - "!**/*.ttf"
    - "!**/*.woff"
    - "!**/*.woff2"

    # ── Auto-generated files ────────────────────────────────────────
    - "!public/assets/icons/atlas.png"
    - "!public/assets/icons/atlas.webp"
    - "!public/style/icon-atlas.css"

    # ── Lock files / dependencies ───────────────────────────────────
    - "!package-lock.json"
    - "!bun.lockb"
    - "!node_modules/**"

    # ── Build artifacts ─────────────────────────────────────────────
    - "!dist/**"
    - "!build/**"
    - "!.cache/**"
    - "!coverage/**"

  # High-level summary at the top of the review (helps for large PRs)
  high_level_summary: true

  # Skip poem (unnecessary overhead)
  poem: false

  # Show review status badge
  review_status: true

  # Auto-review behavior
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "master"
      - "develop"

  # Review profile: "chill" reduces nitpicks on style and focuses on
  # correctness bugs — appropriate for a large performance PR where
  # functional regressions matter more than micro-style.
  profile: "chill"

  # Per-path review instructions. Runtime code matters more than tooling.
  path_instructions:
    - path: "public/scripts/**"
      instructions: |
        Focus on: correctness bugs, race conditions, memory leaks,
        functional regressions, and performance impact. Style is
        secondary — the project already follows established conventions.
    - path: "server.ts"
      instructions: |
        Look for: security issues (path traversal, headers), cache
        invalidation, and startup/runtime performance impact.
    - path: "tools/**"
      instructions: |
        Build scripts. Focus on: idempotency, error handling, and
        whether the generated output is correct.

chat:
  auto_reply: true
