<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Farm XP - A browser-based farming game with animals, crafting, merchants and seasons.">
  <meta name="theme-color" content="#4a7c3f">
  <title>Farm XP</title>
  <!-- fix #84: favicon via SVG data URI (no external file needed) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
  <link rel="manifest" href="./manifest.json">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap">
  <!-- fix #80: style.css com @import foi removido. CSS agora é carregado via <link> tags individuais. -->
  <!-- CSS Variables (deve ser carregado primeiro) -->
  <link rel="stylesheet" href="./style/variables.css">
  <!-- CSSs individuais da pasta style/ -->
  <link rel="stylesheet" href="./style/base.css">
  <link rel="stylesheet" href="./style/modals.css">
  <!-- Issue #76 resolved: hud.css is loaded here as the single source of truth (removed from cssManager.js) -->
  <link rel="stylesheet" href="./style/hud.css">
  <link rel="stylesheet" href="./style/player-panel.css">
  <link rel="stylesheet" href="./style/game.css">
  <link rel="stylesheet" href="./style/character-select.css">
  <link rel="stylesheet" href="./style/house.css">
  <link rel="stylesheet" href="./style/storage.css">
  <link rel="stylesheet" href="./style/commerce.css">
  <link rel="stylesheet" href="./style/config.css">
  <link rel="stylesheet" href="./style/accessibility.css">
  <link rel="stylesheet" href="./style/animal-ui.css">
  <link rel="stylesheet" href="./style/chest.css">
  <link rel="stylesheet" href="./style/build.css">
  <link rel="stylesheet" href="./style/loading.css">
  <link rel="stylesheet" href="./style/well.css">
  <link rel="stylesheet" href="./style/weather.css">
  <link rel="stylesheet" href="./style/mobile-controls.css">
  <link rel="stylesheet" href="./style/crafting.css">
  <link rel="stylesheet" href="./style/player-feedback.css">
  <link rel="stylesheet" href="./style/inventory-actions.css">
  <link rel="stylesheet" href="./style/save-slots.css">
  <link rel="stylesheet" href="./style/help-panel.css">
  <!-- Ícones do Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Script principal -->
  <script src="scripts/main.js" type="module" defer></script>
</head>
<body>
    <div class="theGame">
        <div class="game">
            <canvas id="gameCanvas" aria-label="Farm game view" role="img"></canvas>
        </div>
        <!-- CONFIGURAÇÕES -->
        <div class="modal" id="configModal" role="dialog" aria-modal="true" aria-labelledby="configModalTitle">
            <div class="store-container">
                <div class="modal-header">
                    <h2 id="configModalTitle" data-i18n="settings.title">⚙️ Configurações</h2>
                    <button class="modal-close" aria-label="Close">&times;</button>
                </div>
                <div id="config-content">
                    <div class="setting-row" style="margin: 20px; display: flex; align-items: center; gap: 15px;">
                        <label for="languageSelect" data-i18n="settings.language" style="font-size: 18px; font-weight: 500; color: #fff;">Idioma:</label>
                        <select id="languageSelect" class="setting-select" style="padding: 8px 12px; font-size: 16px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer;">
                            <option value="pt-BR">Português (Brasil)</option>
                            <option value="en">English</option>
                            <option value="es">Español</option>
                        </select>
                    </div>
                    <div class="config-section">
                        <h3 data-i18n="settings.accessibility">Acessibilidade</h3>
                        <div class="config-option">
                            <span class="config-label" data-i18n="settings.highContrast">Alto contraste</span>
                            <label class="config-toggle">
                                <input type="checkbox" id="a11yHighContrast">
                                <span class="config-slider"></span>
                            </label>
                        </div>
                        <div class="config-option">
                            <span class="config-label" data-i18n="settings.reducedMotion">Reduzir animações</span>
                            <label class="config-toggle">
                                <input type="checkbox" id="a11yReducedMotion">
                                <span class="config-slider"></span>
                            </label>
                        </div>
                        <div class="config-option">
                            <span class="config-label" data-i18n="settings.textSize">Tamanho do texto</span>
                            <select id="a11yTextSize" class="config-select">
                                <option value="normal" data-i18n="settings.textNormal">Normal</option>
                                <option value="large" data-i18n="settings.textLarge">Grande</option>
                                <option value="extra-large" data-i18n="settings.textExtraLarge">Extra Grande</option>
                            </select>
                        </div>
                        <div class="config-option">
                            <span class="config-label" data-i18n="settings.colorVision">Modo de visão de cor</span>
                            <select id="a11yColorVision" class="config-select">
                                <option value="off" data-i18n="settings.cvOff">Desligado</option>
                                <option value="protanopia" data-i18n="settings.cvProtanopia">Protanopia</option>
                                <option value="deuteranopia" data-i18n="settings.cvDeuteranopia">Deuteranopia</option>
                                <option value="tritanopia" data-i18n="settings.cvTritanopia">Tritanopia</option>
                                <option value="achromatopsia" data-i18n="settings.cvAchromatopsia">Acromatopsia</option>
                            </select>
                        </div>
                        <div class="config-option">
                            <span class="config-label" data-i18n="settings.screenReader">Anúncios para leitor de tela</span>
                            <label class="config-toggle">
                                <input type="checkbox" id="a11yScreenReader">
                                <span class="config-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tela de Lista de Mercadores -->
    <div id="merchantsListModal" class="mch-merchant-commerce-system">
        <div class="mch-merchants-list-screen">
            <div class="mch-commerce-header">
                <div class="mch-commerce-title" data-i18n="ui.merchants">🏪 Mercadores da Região</div>
            </div>
            
            <div class="mch-merchants-grid" id="merchantsGrid">
                <!-- Mercadores serão inseridos via JavaScript -->
            </div>
            
            <div class="mch-commerce-controls">
               <button class="mch-close-button" data-i18n="ui.close">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Tela de Comércio com Mercador Específico -->
    <div id="commerceModal" class="mch-merchant-commerce-system">
        <div class="mch-commerce-container">
            <div class="mch-commerce-header">
                <div class="mch-commerce-title" data-i18n="ui.commerce">💼 Comércio</div>
            </div>
            
            <div class="mch-commerce-layout">
                <!-- Painel do Jogador -->
                <div class="mch-commerce-player-panel">
                    <div class="mch-player-panel-header">
                        <div class="mch-storage-toggle-buttons">
                            <button class="mch-storage-toggle-btn active" data-storage="inventory" data-i18n="ui.inventoryTab">🎒 Inventário</button>
                            <button class="mch-storage-toggle-btn" data-storage="storage" data-i18n="ui.storageTab">📦 Armazém</button>
                        </div>
                        <div class="mch-player-categories" id="playerCategories">
                            <!-- Categorias serão inseridas via JavaScript -->
                        </div>
                    </div>
                    <div class="mch-player-items-grid" id="playerItemsGrid">
                        <!-- Itens do jogador inseridos via JS -->
                    </div>
                </div>
                
                <!-- Painel Central de Ação -->
                <div class="mch-action-panel">
                    <div class="mch-action-indicator" id="actionIndicator">💸 Vendendo</div>
                    <div class="mch-arrow-container">
                        <div class="mch-trade-arrow mch-sell-arrow">🢂</div>
                        <div class="mch-trade-arrow mch-buy-arrow">🢀</div>
                    </div>
                    <div class="mch-action-indicator" id="tradeValue">$0</div>
                </div>
                
                <!-- Painel do Mercador -->
                <div class="mch-merchant-panel">
                    <div class="mch-merchant-header">
                        <img src="" alt="Mercador" class="mch-merchant-avatar" id="merchantAvatar">
                        <div class="mch-merchant-info">
                            <div class="mch-merchant-name" id="merchantName">Nome do Mercador</div>
                            <div class="mch-merchant-profession" id="merchantProfession">Profissão</div>
                            <div class="mch-merchant-specialty" id="merchantSpecialty">Especialidade</div>
                        </div>
                    </div>
                    <div class="mch-merchant-categories" id="merchantCategories">
                        <!-- Categorias do mercador -->
                    </div>
                    <div class="mch-merchant-items-grid" id="merchantItemsGrid">
                        <!-- Itens do mercador inseridos via JS -->
                    </div>
                </div>
            </div>
            
            <div class="mch-commerce-controls">
                <button class="mch-back-button" data-i18n="ui.backToMerchants">← Voltar aos Mercadores</button>
                <button class="mch-close-button" data-i18n="ui.close">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação de Transação -->
    <div class="mch-trade-confirm-modal" id="tradeConfirmModal">
        <div class="mch-confirm-content">
            <!-- Mensagem da Transação -->
            <div class="mch-confirm-message" id="confirmMessage"></div>

            <!-- Controles de Quantidade -->
            <div class="mch-quantity-controls">
                <button class="mch-quantity-btn mch-quantity-decrease" id="quantityDecreaseBtn">
                    <span>−</span>
                </button>
                <div class="mch-quantity-display">
                    <span data-i18n="trading.quantity">Quantidade</span>:
                    <span id="tradeQuantityDisplay" class="mch-quantity-value">1</span>
                </div>
                <button class="mch-quantity-btn mch-quantity-increase" id="quantityIncreaseBtn">
                    <span>+</span>
                </button>
            </div>

            <!-- Botões de Confirmação -->
            <div class="mch-confirm-buttons">
                <button class="mch-confirm-btn mch-confirm-yes" data-i18n="trading.confirm">✓ Confirmar</button>
                <button class="mch-confirm-btn mch-confirm-no" data-i18n="ui.cancel">✕ Cancelar</button>
            </div>
        </div>
    </div>
    
</body>
</html>
